<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <header></header>
    <main>
        <!--Creacion de formularios-->
        <form action="#" method="post">
            <div>
                <label for="nombre">Nombre:</label><!--Genera una descripción o una referencia-->
                <input id="nombre" type="text"><!--Caja para introducir texto.-->
                <label for="apellidoM">Apellido Materno</label>
                <input type="text" id="apellidoM">
                <label for="mail">Correo Electronico:</label>
                <input type="email" name="" id="mail">
            </div>
            <div>
                <label for="apellidoP">Apellido Paterno:</label>
                <input id="apellidoP" type="text">
            </div>
            <div>
                <label for="mensaje">Mensaje:</label>
                <textarea name="" id="mensaje" cols="30" rows="10"></textarea>
            </div>

            <button type="submit">Enviar</button>
        </form>
    </main>
    <footer></footer>
    
</body>
</html>
