<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pseudo-clases y Pseudo-elementos</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!--PSEUDO CLASES-->
    <h2>Pseudo-clases</h2>

    <!--Hover me-->
    <button>Hover me</button>

    <!-- :focus-->
    <input type="text" placeholder="click me">

    <!-- :first-child, :last-chid -->
    <ul>
        <li>Primer item</li>
        <li>Segundo item</li>
        <li>Tercer item</li>
        <li>Último item</li>
    </ul>

    <!-- :nth-child -->
    <table>
        <tr>
            <td>Fila 1</td>
        </tr>
        <tr>
            <td>Fila 2</td>
        </tr>
        <tr>
            <td>Fila 3</td>
        </tr>
        <tr>
            <td>Fila 4</td>
        </tr>
    </table>
    
</body>
</html>
